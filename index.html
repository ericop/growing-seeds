<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Growing Seeds</title>
  <style>
    html, body {
      margin: 0;
      background: #e9dec6;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
    }

    canvas {
      display: block;
      width: min(800px, 100vw);
      height: auto;
      aspect-ratio: 800 / 300;
      background: #f3ebd8;
      box-shadow: 0 10px 28px rgba(77, 58, 32, 0.18);
      touch-action: manipulation;
    }

    canvas:fullscreen {
      background: #f3ebd8;
    }

    canvas:-webkit-full-screen {
      background: #f3ebd8;
    }
  </style>
  <script defer src="growing-seeds.js"></script>
</head>
<body>
  <canvas id="game" width="800" height="300"></canvas>
</body>
</html>
